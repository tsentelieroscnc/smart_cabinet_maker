<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Cabinet Maker Pro</title>
  <link rel="stylesheet" href="style.css?v=2.2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <h2>Smart Cabinet</h2>
      <div class="preset-manager" style="padding: 10px; border-bottom: 1px solid var(--border-color); margin-bottom: 5px;">
        <label style="font-size: 10px; color: #666; text-transform: uppercase;">Πρότυπο:</label>
        <select id="preset_selector" onchange="loadPreset()" style="width: 100%; margin-top: 5px; height: 24px; font-size: 12px;">
            <option value="">-- Επιλογή --</option>
        </select>
      </div>
      <button class="tablink active" onclick="openTab(event, 'globals')">Γενικοί Κανόνες</button>
      <button class="tablink" onclick="openTab(event, 'box')">Σώμα (Box)</button>
      <button class="tablink" onclick="openTab(event, 'joinery')">Συνδεσμολογία</button>
      <button class="tablink" onclick="openTab(event, 'interior')">Εσωτερικό</button>
      <button class="tablink" onclick="openTab(event, 'fronts')">Προσόψεις</button>
      <button class="tablink" onclick="openTab(event, 'materials')">Υλικά</button>
      <div class="sidebar-footer">
        <button class="btn-build-main" onclick="buildCabinet()">Build</button>
      </div>
    </div>
    
    <div class="main-content">
      <div id="globals" class="tabcontent" style="display:block">
        <h3>Γενικοί Κανόνες</h3>
        <div class="field">
          <label>Πάχος Υλικού (mm):</label>
          <input type="number" id="mat_th" value="18">
        </div>
        <div class="field">
          <label>Πάχος Πλάτης (mm):</label>
          <input type="number" id="back_th" value="8">
        </div>
        <div class="field">
          <label>Αρμός / Gap (mm):</label>
          <input type="number" id="gap" value="3" step="0.5">
        </div>
        <div class="field">
          <label>Ύψος Μπάζας (mm):</label>
          <input type="number" id="plinth" value="100">
        </div>
        
        <div class="preset-save-zone" style="margin-top: 15px; padding-top: 10px;">
            <input type="text" class="preset-name-input" placeholder="Όνομα προτύπου..." style="height: 24px;">
            <button class="btn-secondary" onclick="savePreset(this)" style="padding: 4px 10px;">Save</button>
        </div>
      </div>

      <div id="box" class="tabcontent">
        <h3>Διαστάσεις & Κατασκευή</h3>
        <div class="property-grid" style="margin-bottom: 10px;">
            <div class="field">
                <label>Πλάτος (W)</label>
                <input type="number" id="width" value="600">
            </div>
            <div class="field">
                <label>Ύψος (H)</label>
                <input type="number" id="height" value="800">
            </div>
            <div class="field">
                <label>Βάθος (D)</label>
                <input type="number" id="depth" value="500">
            </div>
            <div class="field">
                <label>Τύπος Πλάτης</label>
                <select id="back_type">
                    <option value="Nailed">Καρφωτή</option>
                    <option value="Grooved">Γκινισιά</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
        </div>
        
        <div class="field">
          <label>Τύπος Καπακιού:</label>
          <select id="top_type">
            <option value="Solid">Ενιαίο Panel</option>
            <option value="Rails">Τραβέρσες (Rails)</option>
          </select>
        </div>
        <div class="field">
          <label>Φάρδος Τραβέρσας (mm):</label>
          <input type="number" id="rail_width" value="100">
        </div>
        <div class="property-grid" style="margin-top: 10px;">
            <div class="field">
                <label>Inset Μπάζας (F)</label>
                <input type="number" id="plinth_inset_f" value="50">
            </div>
            <div class="field">
                <label>Inset Μπάζας (B)</label>
                <input type="number" id="plinth_inset_b" value="0">
            </div>
        </div>
      </div>

      <div id="joinery" class="tabcontent">
        <h3>Συνδεσμολογία</h3>
        
        <div class="section-header">Ρυθμίσεις Ενώσεων</div>
        <div class="field">
          <label>Τύπος Σύνδεσης:</label>
          <select id="conn_type">
            <option value="TopOverSide">Top/Bottom over Sides</option>
            <option value="SideOverTop">Sides over Top/Bottom</option>
            <option value="Miter">Miter (45° Φάλτσο)</option>
          </select>
        </div>

        <div class="section-header">Hardware (Σύνδεσμοι)</div>
        <div class="property-grid">
            <div class="field">
                <label>Τύπος</label>
                <select id="connector_type" onchange="updateConnectorPreview()">
                    <option value="Dowel">Καβίλιες</option>
                    <option value="Screw">Βίδες</option>
                    <option value="Minifix">Minifix</option>
                    <option value="None">Κανένας</option>
                </select>
            </div>
            <div class="field">
                <label>Λειτουργία</label>
                <select id="connector_mode" onchange="updateConnectorPreview()">
                    <option value="Manual">Σταθερός Αριθμός</option>
                    <option value="Auto">Αυτόματο (Βήμα)</option>
                </select>
            </div>
            <div class="field">
                <label>Ποσότητα/Βήμα</label>
                <input type="number" id="connector_val" value="3" oninput="updateConnectorPreview()">
            </div>
            <div class="field">
                <label>Offset Άκρης (mm)</label>
                <input type="number" id="connector_offset" value="37" oninput="updateConnectorPreview()">
            </div>
        </div>

        <div class="section-header">Πλάτη & Γκινισιά</div>
        <div class="property-grid">
            <div class="field">
                <label>Εσοχή (Inset)</label>
                <input type="number" id="back_inset" value="15">
            </div>
            <div class="field">
                <label>Βάθος Γκινισιάς</label>
                <input type="number" id="groove_depth" value="8">
            </div>
        </div>

        <div id="panel_preview_container" class="connector-preview-container" style="padding: 10px; margin-top: 10px;">
            <div class="connector-preview-label">Προεπισκόπηση Πλαϊνού (Βάθος)</div>
            <div id="panel_preview" class="panel-preview" style="height: 40px;"></div>
        </div>
      </div>

      <div id="interior" class="tabcontent">
        <h3>Εσωτερική Διαμόρφωση</h3>
        <div class="field">
          <label>Κάθετοι Ορθοστάτες:</label>
          <select id="v_dividers">
            <option value="0">0 (Ενιαίος χώρος)</option>
            <option value="1">1 (Χώρισμα στη μέση)</option>
          </select>
        </div>
        <div class="field">
          <label>Αριθμός Ραφιών (ανά ζώνη):</label>
          <input type="number" id="shelves" value="2">
        </div>
      </div>

      <div id="fronts" class="tabcontent">
        <h3>Προσόψεις & Πόμολα</h3>
        <div class="property-grid">
            <div class="field">
                <label>Τύπος Πρόσοψης</label>
                <select id="front_type">
                    <option value="Open">Ανοιχτό</option>
                    <option value="Doors" selected>Πόρτες</option>
                    <option value="Drawers">Συρτάρια</option>
                </select>
            </div>
            <div class="field">
                <label>Αριθμός (Π/Σ)</label>
                <input type="number" id="front_count" value="2">
            </div>
        </div>
        
        <div class="field" style="margin-top: 10px;">
          <label>Τύπος Πόμολου:</label>
          <select id="handles">
            <option value="None">Κανένα</option>
            <option value="Knob">Knob (Μικρό)</option>
            <option value="Bar">Bar Pull (Μπάρα)</option>
          </select>
        </div>
      </div>

      <div id="materials" class="tabcontent">
        <h3>Βιβλιοθήκη Υλικών</h3>
        <div class="section-header">Σώμα (Carcass)</div>
        <div class="property-grid">
            <div class="field">
                <label>Όνομα</label>
                <input type="text" id="mat_carcass_name" value="White Melamine">
            </div>
            <div class="field">
                <label>Κωδικός</label>
                <input type="text" id="mat_carcass_code" value="W1000">
            </div>
        </div>
        
        <div class="section-header">Προσόψεις (Fronts)</div>
        <div class="field">
          <label>Όνομα Υλικού:</label>
          <input type="text" id="mat_front_name" value="Oak Veneer" style="width: 100%;">
        </div>
      </div>
    </div>
  </div>



  <script src="app.js?v=2.2"></script>
</body>
</html>
